# see the nlohman/json mkdocs for config example:  https://github.com/nlohmann/json/blob/develop/docs/mkdocs/mkdocs.yml
# see Material for mkdocs:  https://squidfunk.github.io/mkdocs-material/reference

# Installing
#   > source venve/bin/activate
#   > pip install mkdocs mkdocs-material plantuml_markdown
#   > mkdocs new my-project
#   > cd my_project
#   > mkdocs serve -a localhost:9003

# Site config
site_name: Megamicros documentation
site_author: Bruno Gas
site_url: http://readthedoc.biimea.io

# Copyright
copyright: Copyright &copy; 2022 - 2023 Bruno Gas - Sorbonne Université

# Repository
repo_name: megamicros
repo_url: https://github.com/bimea/megamicros.git
edit_uri: edit/develop/docs/mkdocs/docs

#docs_dir: src

# navigation
