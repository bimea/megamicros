        - Jetson Nano: tutorials/mu-server/install/jetson.md
        - Mini PC: tutorials/mu-server/install/minipc.md
        - Raspberry Pi: tutorials/mu-server/install/raspi.md
        - Orange Pi 3B: tutorials/mu-server/install/orangepi3b.md
        - 4G Router: tutorials/mu-server/install/4Grouter.md
      - Using: 'tutorials/mu-server/using.md'
      - Dev: 
        - tutorials/mu-server/dev/index.md
        - MQTT client: 'tutorials/mu-server/dev/mqtt-client.md'
      - C++ tools:
        - tutorials/mu-server/c++tools/index.md
    - Megamicros ML:
      - tutorials/beamlearning/index.md
      - AiDB: tutorials/beamlearning/aidb.md
      - AiBoard: tutorials/beamlearning/aiboard.md
      - AiLab: tutorials/beamlearning/ailab.md
      - Beamforming:
        - tutorials/beamlearning/beamforming/index.md
    - IoT:
      - tutorials/iot/index.md
      - MQTT server: tutorials/iot/mqtt-server.md
      - MQTT dashboards: tutorials/iot/boards.md
