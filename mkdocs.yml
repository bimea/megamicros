      - MegamicrosUSB:
        - api/c++/megamicros-usb/index.md
        - bmf_callback: api/c++/megamicros-usb/bmf.md
      - Usb:
        - api/c++/usb/index.md
        - AsyncBulkTransfer: api/c++/usb/async_bulk_transfer.md

  - Contributing:
    - dev/index.md
    - Getting started: dev/getting_started.md
    - Writing doc: dev/writing_doc.md
    - Managing tools: 
      - dev/managing_tools/index.md
      - Python packaging: dev/managing_tools/python_package.md
      - Python repository: dev/managing_tools/python_repos.md
      - Nginx as proxy: dev/managing_tools/nginx_proxy.md
    - Dash components:
      - dev/dash/index.md
      - Installing dev tools: dev/dash/install.md
      - Dash websocket: dev/dash/dash-websocket.md


# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - codehilite:
      guess_lang: false
  - footnotes
  - md_in_html
  - plantuml_markdown:
      format: svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde
  - pymdownx.snippets:
      base_path: src
      check_paths: true
  - toc:
      permalink: true

# Javascripts extensions
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Pluggins
plugins:
  - mkdocstrings


# Doc theme
theme: 
  name: material
  language: en
  features:
    - content.code.copy
    - content.code.select
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - content.tabs.link
  font:
    text: Roboto
    code: JetBrains Mono
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: slate
      #primary: indigo
      #accent: indigo
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: default
      #primary: indigo
      #accent: indigo
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode


